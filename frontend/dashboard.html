<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Web - Dashboard</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            font-weight: bold;
            color: #4a5568;
        }

        .user-name i {
            margin-right: 8px;
            color: #667eea;
        }

        .rol-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
        }

        .rol-badge i {
            margin-right: 6px;
            font-size: 12px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #f56565 0%, #ed64a6 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn i {
            margin-right: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #718096;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #2d3748;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            background: rgba(255,255,255,0.95);
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            color: #4a5568;
        }

        .tab i {
            margin-right: 8px;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        /* Panels */
        .panel {
            display: none;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel.active {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .panel-header h2 {
            color: #2d3748;
            font-size: 24px;
        }

        .panel-header h2 i {
            margin-right: 12px;
            color: #667eea;
        }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 12px;
        }

        .search-input {
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            width: 280px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        th i {
            margin-right: 8px;
        }

        td {
            padding: 14px 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f7fafc;
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn i {
            margin-right: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #fc8181 0%, #e53e3e 100%);
            color: white;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-pendiente {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-prestado {
            background: #dbeafe;
            color: #2563eb;
        }

        .badge-devuelto {
            background: #d1fae5;
            color: #059669;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 24px;
            width: 480px;
            max-width: 90%;
            animation: fadeIn 0.2s ease;
        }

        .modal-content h3 {
            margin-bottom: 25px;
            color: #2d3748;
        }

        .modal-content h3 i {
            margin-right: 10px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .form-group label i {
            margin-right: 6px;
            color: #667eea;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .container {
                padding: 0 15px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .panel-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-box {
                width: 100%;
            }
            .search-input {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-book-open"></i>
            <h1>Biblioteca Web</h1>
        </div>
        <div class="user-info">
            <span class="user-name"><i class="fas fa-user-circle"></i> <span id="userName"></span></span>
            <span class="rol-badge" id="userRol"></span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Tabs -->
        <div class="tabs" id="tabs"></div>
        
        <!-- Panel Catálogo -->
        <div id="librosPanel" class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-book"></i> Catálogo de Libros</h2>
                <div class="search-box">
                    <input type="text" id="buscarTitulo" class="search-input" placeholder="Buscar por título...">
                    <button onclick="cargarLibros()" class="btn btn-primary"><i class="fas fa-search"></i> Buscar</button>
                </div>
            </div>
            <div id="librosContent"></div>
        </div>

        <!-- Panel Mis Préstamos -->
        <div id="prestamosPanel" class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-list-alt"></i> Mis Préstamos</h2>
            </div>
            <div id="prestamosContent"></div>
        </div>

        <!-- Panel Admin Libros -->
        <div id="adminLibrosPanel" class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-plus-circle"></i> Administrar Libros</h2>
                <button onclick="mostrarModalLibro()" class="btn btn-primary"><i class="fas fa-plus"></i> Nuevo Libro</button>
            </div>
            <div id="adminLibrosContent"></div>
        </div>

        <!-- Panel Admin Préstamos -->
        <div id="adminPrestamosPanel" class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-chart-line"></i> Todos los Préstamos</h2>
            </div>
            <div id="adminPrestamosContent"></div>
        </div>

        <!-- Panel Admin Usuarios -->
        <div id="adminUsuariosPanel" class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-users"></i> Gestionar Usuarios</h2>
            </div>
            <div id="adminUsuariosContent"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalLibro" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-book"></i> <span id="modalTitle">Nuevo Libro</span></h3>
            <input type="hidden" id="libroId">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Título</label>
                <input type="text" id="libroTitulo" placeholder="Ej: Cien años de soledad">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Autor</label>
                <input type="text" id="libroAutor" placeholder="Ej: Gabriel García Márquez">
            </div>
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Categoría</label>
                <input type="text" id="libroCategoria" placeholder="Ej: Novela">
            </div>
            <div class="form-group">
                <label><i class="fas fa-cubes"></i> Cantidad</label>
                <input type="number" id="libroCantidad" placeholder="1">
            </div>
            <div class="modal-buttons">
                <button onclick="guardarLibro()" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                <button onclick="cerrarModalLibro()" class="btn btn-danger"><i class="fas fa-times"></i> Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN ==========
        const API_URL = 'http://localhost:3001';
        
        let token = localStorage.getItem('token');
        let usuario = JSON.parse(localStorage.getItem('usuario') || '{}');

        if (!token) {
            window.location.href = 'index.html';
        }

        document.getElementById('userName').innerHTML = usuario.nombre || 'Usuario';
        document.getElementById('userRol').innerHTML = usuario.rol === 'admin' ? '<i class="fas fa-crown"></i> Administrador' : '<i class="fas fa-user"></i> Usuario';

        // ========== CARGAR ESTADÍSTICAS ==========
        async function cargarEstadisticas() {
            if (usuario.rol !== 'admin') return;
            
            try {
                const [librosRes, prestamosRes, usuariosRes] = await Promise.all([
                    fetch(`${API_URL}/libros`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_URL}/prestamos/todos`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_URL}/usuarios`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                
                const libros = await librosRes.json();
                const prestamos = await prestamosRes.json();
                const usuarios = await usuariosRes.json();
                
                const totalLibros = libros.length;
                const totalPrestamos = prestamos.length;
                const prestamosActivos = prestamos.filter(p => p.estado !== 'devuelto').length;
                const totalUsuarios = usuarios.length;
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <i class="fas fa-book"></i>
                        <h3>Libros Registrados</h3>
                        <div class="number">${totalLibros}</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-hand-peace"></i>
                        <h3>Préstamos Activos</h3>
                        <div class="number">${prestamosActivos}</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-history"></i>
                        <h3>Total Préstamos</h3>
                        <div class="number">${totalPrestamos}</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <h3>Usuarios Registrados</h3>
                        <div class="number">${totalUsuarios}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
            }
        }

        // ========== CARGAR LIBROS ==========
        async function cargarLibros() {
            const titulo = document.getElementById('buscarTitulo').value;
            let url = `${API_URL}/libros`;
            if (titulo) url += `?titulo=${titulo}`;
            
            try {
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const libros = await res.json();
                
                if (!Array.isArray(libros) || libros.length === 0) {
                    document.getElementById('librosContent').innerHTML = '<p style="text-align:center; color:#718096; padding:40px;"><i class="fas fa-box-open"></i> No hay libros disponibles.</p>';
                    return;
                }
                
                let html = `<div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th><i class="fas fa-heading"></i> Título</th>
                                <th><i class="fas fa-user"></i> Autor</th>
                                <th><i class="fas fa-tag"></i> Categoría</th>
                                <th><i class="fas fa-cubes"></i> Disponibles</th>
                                ${usuario.rol !== 'admin' ? '<th><i class="fas fa-cart-plus"></i> Acción</th>' : ''}
                            </tr>
                        </thead>
                        <tbody>`;
                
                libros.forEach(libro => {
                    html += `<tr>
                        <td><strong>${libro.titulo}</strong></td>
                        <td>${libro.autor}</td>
                        <td>${libro.categoria || '-'}</td>
                        <td><span style="background:#e2e8f0; padding:5px 14px; border-radius:25px; font-weight:bold;">${libro.cantidad}</span></td>`;
                    if (usuario.rol !== 'admin') {
                        html += `<td><button class="btn btn-success btn-sm" onclick="solicitarPrestamo(${libro.id})"><i class="fas fa-hand-peace"></i> Solicitar</button></td>`;
                    }
                    html += `</tr>`;
                });
                html += '</tbody></table></div>';
                document.getElementById('librosContent').innerHTML = html;
            } catch (error) {
                document.getElementById('librosContent').innerHTML = '<p style="color:red; text-align:center;"><i class="fas fa-exclamation-triangle"></i> Error al cargar libros</p>';
            }
        }

        // ========== CRUD LIBROS ==========
        async function cargarAdminLibros() {
            const res = await fetch(`${API_URL}/libros`, { headers: { 'Authorization': `Bearer ${token}` } });
            const libros = await res.json();
            
            let html = `<div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fas fa-heading"></i> Título</th>
                            <th><i class="fas fa-user"></i> Autor</th>
                            <th><i class="fas fa-tag"></i> Categoría</th>
                            <th><i class="fas fa-cubes"></i> Cantidad</th>
                            <th><i class="fas fa-cog"></i> Acciones</th>
                        </tr>
                    </thead>
                    <tbody>`;
            libros.forEach(libro => {
                html += `<tr>
                    <td>${libro.titulo}</td>
                    <td>${libro.autor}</td>
                    <td>${libro.categoria || '-'}</td>
                    <td>${libro.cantidad}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="editarLibro(${libro.id})"><i class="fas fa-edit"></i> Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="eliminarLibro(${libro.id})"><i class="fas fa-trash"></i> Eliminar</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('adminLibrosContent').innerHTML = html;
        }

        // ========== PRÉSTAMOS ==========
        async function solicitarPrestamo(libroId) {
            const fecha = new Date();
            fecha.setDate(fecha.getDate() + 7);
            const fechaDevolucion = fecha.toISOString().split('T')[0];
            
            const res = await fetch(`${API_URL}/prestamos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ libro_id: libroId, fecha_devolucion: fechaDevolucion })
            });
            
            if (res.ok) {
                Swal.fire({
                    icon: 'success',
                    title: '¡Préstamo solicitado!',
                    text: 'Espera la aprobación del administrador.',
                    confirmButtonColor: '#667eea'
                });
                cargarMisPrestamos();
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'No se pudo solicitar el préstamo',
                    confirmButtonColor: '#e53e3e'
                });
            }
        }

        async function cargarMisPrestamos() {
            const res = await fetch(`${API_URL}/prestamos/mis-prestamos`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const prestamos = await res.json();
            
            if (!Array.isArray(prestamos) || prestamos.length === 0) {
                document.getElementById('prestamosContent').innerHTML = '<p style="text-align:center; color:#718096; padding:40px;"><i class="fas fa-inbox"></i> No tienes préstamos registrados.</p>';
                return;
            }
            
            let html = `<div class="table-container"><table>
                <thead>
                    <tr>
                        <th><i class="fas fa-qrcode"></i> Código</th>
                        <th><i class="fas fa-book"></i> Libro</th>
                        <th><i class="fas fa-calendar"></i> Fecha Préstamo</th>
                        <th><i class="fas fa-chart-line"></i> Estado</th>
                    </tr>
                </thead>
                <tbody>`;
            prestamos.forEach(p => {
                let badgeClass = '';
                if (p.estado === 'pendiente') badgeClass = 'badge-pendiente';
                else if (p.estado === 'prestado') badgeClass = 'badge-prestado';
                else badgeClass = 'badge-devuelto';
                
                let estadoIcon = p.estado === 'pendiente' ? 'fa-clock' : (p.estado === 'prestado' ? 'fa-check-circle' : 'fa-check-double');
                
                html += `<tr>
                    <td><strong>${p.codigo}</strong></td>
                    <td>${p.Libro?.titulo || '-'}</td>
                    <td>${p.fecha_prestamo || '-'}</td>
                    <td><span class="badge ${badgeClass}"><i class="fas ${estadoIcon}"></i> ${p.estado}</span></td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('prestamosContent').innerHTML = html;
        }

        async function cargarAdminPrestamos() {
            const res = await fetch(`${API_URL}/prestamos/todos`, { headers: { 'Authorization': `Bearer ${token}` } });
            const prestamos = await res.json();
            
            let html = `<div class="table-container"><table>
                <thead>
                    <tr>
                        <th><i class="fas fa-qrcode"></i> Código</th>
                        <th><i class="fas fa-user"></i> Usuario</th>
                        <th><i class="fas fa-book"></i> Libro</th>
                        <th><i class="fas fa-calendar"></i> Fecha</th>
                        <th><i class="fas fa-chart-line"></i> Estado</th>
                        <th><i class="fas fa-cog"></i> Acciones</th>
                    </tr>
                </thead>
                <tbody>`;
            prestamos.forEach(p => {
                let badgeClass = '';
                let estadoIcon = '';
                if (p.estado === 'pendiente') {
                    badgeClass = 'badge-pendiente';
                    estadoIcon = 'fa-clock';
                } else if (p.estado === 'prestado') {
                    badgeClass = 'badge-prestado';
                    estadoIcon = 'fa-check-circle';
                } else {
                    badgeClass = 'badge-devuelto';
                    estadoIcon = 'fa-check-double';
                }
                
                html += `<tr>
                    <td><strong>${p.codigo}</strong></td>
                    <td>${p.Usuario?.nombre || '-'}</td>
                    <td>${p.Libro?.titulo || '-'}</td>
                    <td>${p.fecha_prestamo || '-'}</td>
                    <td><span class="badge ${badgeClass}"><i class="fas ${estadoIcon}"></i> ${p.estado}</span></td>
                    <td>`;
                if (p.estado === 'pendiente') html += `<button class="btn btn-success btn-sm" onclick="aprobarPrestamo(${p.id})"><i class="fas fa-check"></i> Aprobar</button>`;
                if (p.estado === 'prestado') html += `<button class="btn btn-warning btn-sm" onclick="devolverLibro(${p.id})"><i class="fas fa-undo"></i> Devolver</button>`;
                html += `</td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('adminPrestamosContent').innerHTML = html;
        }

        async function aprobarPrestamo(id) {
            const result = await Swal.fire({
                title: '¿Aprobar préstamo?',
                text: 'El usuario podrá recoger el libro',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#48bb78',
                cancelButtonColor: '#e53e3e',
                confirmButtonText: '<i class="fas fa-check"></i> Sí, aprobar',
                cancelButtonText: '<i class="fas fa-times"></i> Cancelar'
            });
            
            if (result.isConfirmed) {
                await fetch(`${API_URL}/prestamos/${id}/aprobar`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } });
                Swal.fire('Aprobado', 'Préstamo aprobado correctamente', 'success');
                cargarAdminPrestamos();
                cargarLibros();
                if (usuario.rol === 'admin') cargarEstadisticas();
            }
        }

        async function devolverLibro(id) {
            const result = await Swal.fire({
                title: '¿Registrar devolución?',
                text: 'El libro volverá al inventario',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#48bb78',
                cancelButtonColor: '#e53e3e',
                confirmButtonText: '<i class="fas fa-check"></i> Sí, devolver',
                cancelButtonText: '<i class="fas fa-times"></i> Cancelar'
            });
            
            if (result.isConfirmed) {
                await fetch(`${API_URL}/prestamos/${id}/devolver`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } });
                Swal.fire('Devuelto', 'Devolución registrada correctamente', 'success');
                cargarAdminPrestamos();
                cargarLibros();
                if (usuario.rol === 'admin') cargarEstadisticas();
            }
        }

        // ========== ADMIN USUARIOS ==========
        async function cargarAdminUsuarios() {
            const res = await fetch(`${API_URL}/usuarios`, { headers: { 'Authorization': `Bearer ${token}` } });
            const usuarios = await res.json();
            
            let html = `<div class="table-container"><table>
                <thead>
                    <tr>
                        <th><i class="fas fa-user"></i> Nombre</th>
                        <th><i class="fas fa-envelope"></i> Email</th>
                        <th><i class="fas fa-tag"></i> Rol</th>
                        <th><i class="fas fa-cog"></i> Acciones</th>
                    </tr>
                </thead>
                <tbody>`;
            usuarios.forEach(u => {
                html += `<tr>
                    <td>${u.nombre}</td>
                    <td>${u.email}</td>
                    <td>${u.rol === 'admin' ? '<span class="badge badge-prestado"><i class="fas fa-crown"></i> Admin</span>' : '<span class="badge badge-devuelto"><i class="fas fa-user"></i> Usuario</span>'}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id})"><i class="fas fa-trash"></i> Eliminar</button></td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('adminUsuariosContent').innerHTML = html;
        }

        async function eliminarUsuario(id) {
            const result = await Swal.fire({
                title: '¿Eliminar usuario?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e53e3e',
                cancelButtonColor: '#718096',
                confirmButtonText: '<i class="fas fa-trash"></i> Sí, eliminar',
                cancelButtonText: '<i class="fas fa-times"></i> Cancelar'
            });
            
            if (result.isConfirmed) {
                await fetch(`${API_URL}/usuarios/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                Swal.fire('Eliminado', 'Usuario eliminado correctamente', 'success');
                cargarAdminUsuarios();
                if (usuario.rol === 'admin') cargarEstadisticas();
            }
        }

        // ========== MODAL LIBROS ==========
        let editandoId = null;

        function mostrarModalLibro() {
            editandoId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> Nuevo Libro';
            document.getElementById('libroId').value = '';
            document.getElementById('libroTitulo').value = '';
            document.getElementById('libroAutor').value = '';
            document.getElementById('libroCategoria').value = '';
            document.getElementById('libroCantidad').value = '1';
            document.getElementById('modalLibro').style.display = 'flex';
        }

        function editarLibro(id) {
            editandoId = id;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Libro';
            document.getElementById('modalLibro').style.display = 'flex';
        }

        async function guardarLibro() {
            const libro = {
                titulo: document.getElementById('libroTitulo').value,
                autor: document.getElementById('libroAutor').value,
                categoria: document.getElementById('libroCategoria').value,
                cantidad: parseInt(document.getElementById('libroCantidad').value)
            };
            
            const url = editandoId ? `${API_URL}/libros/${editandoId}` : `${API_URL}/libros`;
            const method = editandoId ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(libro)
            });
            
            if (res.ok) {
                Swal.fire('Éxito', editandoId ? 'Libro actualizado' : 'Libro creado', 'success');
                cerrarModalLibro();
                cargarAdminLibros();
                cargarLibros();
                if (usuario.rol === 'admin') cargarEstadisticas();
            } else {
                Swal.fire('Error', 'No se pudo guardar el libro', 'error');
            }
        }

        async function eliminarLibro(id) {
            const result = await Swal.fire({
                title: '¿Eliminar libro?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e53e3e',
                cancelButtonColor: '#718096',
                confirmButtonText: '<i class="fas fa-trash"></i> Sí, eliminar',
                cancelButtonText: '<i class="fas fa-times"></i> Cancelar'
            });
            
            if (result.isConfirmed) {
                await fetch(`${API_URL}/libros/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                Swal.fire('Eliminado', 'Libro eliminado correctamente', 'success');
                cargarAdminLibros();
                cargarLibros();
                if (usuario.rol === 'admin') cargarEstadisticas();
            }
        }

        function cerrarModalLibro() {
            document.getElementById('modalLibro').style.display = 'none';
        }

        // Cerrar modal al hacer click fuera
        window.onclick = function(event) {
            const modal = document.getElementById('modalLibro');
            if (event.target === modal) {
                cerrarModalLibro();
            }
        }

        // ========== TABS ==========
        function mostrarTabs() {
            const tabsDiv = document.getElementById('tabs');
            tabsDiv.innerHTML = '';
            
            const tabsList = [{ id: 'libros', nombre: 'Catálogo', icon: 'fa-book' }];
            if (usuario.rol === 'admin') {
                tabsList.push({ id: 'adminLibros', nombre: 'Admin Libros', icon: 'fa-plus-circle' });
                tabsList.push({ id: 'adminPrestamos', nombre: 'Admin Préstamos', icon: 'fa-chart-line' });
                tabsList.push({ id: 'adminUsuarios', nombre: 'Admin Usuarios', icon: 'fa-users' });
            } else {
                tabsList.push({ id: 'prestamos', nombre: 'Mis Préstamos', icon: 'fa-list-alt' });
            }
            
            tabsList.forEach(tab => {
                const btn = document.createElement('button');
                btn.className = 'tab';
                btn.innerHTML = `<i class="fas ${tab.icon}"></i> ${tab.nombre}`;
                btn.onclick = () => mostrarPanel(tab.id);
                tabsDiv.appendChild(btn);
            });
        }

        function mostrarPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            const tabs = document.querySelectorAll('.tab');
            const index = ['libros', 'prestamos', 'adminLibros', 'adminPrestamos', 'adminUsuarios'].indexOf(panelId);
            if (tabs[index]) tabs[index].classList.add('active');
            
            document.getElementById('librosPanel').classList.remove('active');
            document.getElementById('prestamosPanel').classList.remove('active');
            document.getElementById('adminLibrosPanel').classList.remove('active');
            document.getElementById('adminPrestamosPanel').classList.remove('active');
            document.getElementById('adminUsuariosPanel').classList.remove('active');
            
            if (panelId === 'libros') {
                document.getElementById('librosPanel').classList.add('active');
                cargarLibros();
            } else if (panelId === 'prestamos') {
                document.getElementById('prestamosPanel').classList.add('active');
                cargarMisPrestamos();
            } else if (panelId === 'adminLibros') {
                document.getElementById('adminLibrosPanel').classList.add('active');
                cargarAdminLibros();
            } else if (panelId === 'adminPrestamos') {
                document.getElementById('adminPrestamosPanel').classList.add('active');
                cargarAdminPrestamos();
            } else if (panelId === 'adminUsuarios') {
                document.getElementById('adminUsuariosPanel').classList.add('active');
                cargarAdminUsuarios();
            }
        }

        function logout() {
            Swal.fire({
                title: '¿Cerrar sesión?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#e53e3e',
                cancelButtonColor: '#718096',
                confirmButtonText: '<i class="fas fa-sign-out-alt"></i> Sí, salir',
                cancelButtonText: '<i class="fas fa-times"></i> Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.clear();
                    window.location.href = 'index.html';
                }
            });
        }

        // Inicializar
        mostrarTabs();
        mostrarPanel('libros');
        if (usuario.rol === 'admin') cargarEstadisticas();
    </script>
</body>
</html>
