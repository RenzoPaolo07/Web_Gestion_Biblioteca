<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Web - Inicio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }
        .card h2 i {
            margin-right: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            margin-left: 15px;
            margin-top: 15px;
            color: #a0aec0;
        }
        input, select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        button i {
            margin-right: 8px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 36px;
        }
        h1 i {
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <div>
        <h1><i class="fas fa-book-open"></i> Sistema de Gestión de Biblioteca</h1>
        <div class="container">
            <div class="card">
                <h2><i class="fas fa-user-plus"></i> Registro</h2>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regNombre" placeholder="Nombre completo">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Correo electrónico">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Contraseña">
                </div>
                <div class="input-group">
                    <i class="fas fa-tag"></i>
                    <select id="regRol">
                        <option value="usuario">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button onclick="registrar()"><i class="fas fa-check-circle"></i> Registrarse</button>
            </div>
            <div class="card">
                <h2><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</h2>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Correo electrónico">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Contraseña">
                </div>
                <button onclick="login()"><i class="fas fa-arrow-right"></i> Iniciar Sesión</button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'http://localhost:3001';
        
        async function registrar() {
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const rol = document.getElementById('regRol').value;
            
            if (!nombre || !email || !password) {
                Swal.fire('Error', 'Complete todos los campos', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password, rol })
                });
                const data = await res.json();
                
                if (res.ok) {
                    Swal.fire('¡Registro exitoso!', 'Ya puedes iniciar sesión', 'success');
                    document.getElementById('regNombre').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    Swal.fire('Error', data.message || data.error || 'Error al registrar', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Error de conexión con el servidor', 'error');
            }
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                Swal.fire('Error', 'Complete todos los campos', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.user));
                    Swal.fire({
                        icon: 'success',
                        title: '¡Bienvenido!',
                        text: `Hola ${data.user.nombre}`,
                        timer: 1500,
                        showConfirmButton: false
                    });
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    Swal.fire('Error', data.message || 'Credenciales inválidas', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Error de conexión con el servidor', 'error');
            }
        }
    </script>
</body>
</html>
